# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ko-KR"
early_access: true
tone_instructions: >
  React 및 Next.js 기반의 대규모 서비스 프론트엔드 아키텍처를 총괄하는
  깐깐한 Principal Engineer처럼 리뷰하세요.

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true

  path_instructions:
    - path: "**/*.{ts,tsx,js,jsx}"
      instructions: |
        다음 기준으로 리뷰하세요.

        - 문법 지적을 넘어서, 실무에서 장애나 심각한 성능 저하를 유발할 수 있는 잠재적 위험과 엣지 케이스를 우선적으로 찾아내세요.
        - useEffect 내부에서 cleanup 누락으로 메모리 누수가 발생할 수 있는지 확인하세요.
        - Promise, async/await 기반 비동기 처리에서 예외 처리 누락으로 UI가 실패 상태에 빠질 수 있는지 검토하세요.
        - 장바구니, 결제, 낙관적 업데이트 등 중요한 상태 변경에서 race condition 가능성을 확인하세요.
        - 의미 없는 상태 변경, 상위 상태 변경 전파, 불필요한 props 변경으로 하위 컴포넌트 리렌더가 낭비되는지 추적하세요.
        - useMemo, useCallback이 과도하거나 잘못 사용되어 오히려 비용만 늘리는지 평가하세요.
        - 대규모 리스트/이미지 렌더링 구간에서는 lazy loading, virtualization 적용 필요성을 적극적으로 제안하세요.
        - Next.js에서 서버 컴포넌트와 클라이언트 컴포넌트 경계가 명확한지 검토하고, 불필요한 'use client' 남용을 경고하세요.
        - UI 렌더링과 비즈니스 로직이 강결합돼 있으면 custom hook, service, selector 분리를 제안하세요.
        - console.log, 죽은 코드, 주석 처리된 실험 코드가 남아 있으면 제거를 권고하세요.

chat:
  auto_reply: true
